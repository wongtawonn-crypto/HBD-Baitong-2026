<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Birthday OS 🥥</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff8b8b;
            --glass: rgba(255, 255, 255, 0.2);
            --window-bg: rgba(255, 255, 255, 0.95);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Itim', cursive;
            overflow: hidden;
            /* เลือกใช้ Wallpaper ที่ดูสบายตา */
            background: url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
        }

        /* --- หน้า Login (Minimal Lock Screen) --- */
        #login-screen {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3); /* มืดลงนิดนึงเพื่อให้ตัวหนังสือเด่น */
            backdrop-filter: blur(25px); /* เบลอพื้นหลังเยอะๆ ให้ดูแพง */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s;
        }

        .user-profile {
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 50px; color: white;
            border: 2px solid rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }

        .login-box h2 {
            color: white; margin: 0 0 20px 0; font-weight: 300; letter-spacing: 1px;
        }

        .input-group {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.15);
            padding: 5px 5px 5px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }

        #passInput {
            background: transparent; border: none; color: white;
            font-family: 'Itim'; font-size: 18px; outline: none; width: 180px;
        }
        #passInput::placeholder { color: rgba(255,255,255,0.5); }

        .enter-btn {
            width: 40px; height: 40px; border-radius: 50%;
            border: none; background: white; color: #333;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: 0.3s;
        }
        .enter-btn:hover { background: var(--primary); color: white; }

        /* --- หน้า Desktop --- */
        #desktop {
            height: calc(100% - 60px);
            padding: 30px; display: grid;
            grid-template-columns: repeat(auto-fill, 90px);
            grid-auto-rows: 100px; gap: 20px;
        }

        .icon {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .icon:active { transform: scale(0.9); }
        .icon i { font-size: 35px; margin-bottom: 8px; }
        .icon span { font-size: 14px; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 10px; }

        /* --- Window Style --- */
        .window {
            position: absolute; top: 15%; left: 5%;
            width: 90%; max-width: 380px;
            background: var(--window-bg); border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            display: none; flex-direction: column;
            z-index: 100; overflow: hidden;
            animation: winOpen 0.3s ease-out;
        }
        @keyframes winOpen { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .window-header {
            background: #f8f8f8; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee;
        }
        .close-btn { width: 12px; height: 12px; background: #ff5f56; border-radius: 50%; cursor: pointer; }

        /* --- Taskbar (iOS/macOS Dock Style) --- */
        #dock {
            height: 60px; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; padding: 0 15px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.3);
            gap: 15px;
        }
        .dock-item { font-size: 24px; color: white; cursor: pointer; transition: 0.2s; }
        .dock-item:hover { transform: translateY(-5px); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="user-profile"><i class="fas fa-user"></i></div>
        <div class="login-box" style="text-align: center;">
            <h2>ยินดีต้อนรับครับ</h2>
            <div class="input-group">
                <input type="text" id="passInput" placeholder="กรอกชื่อเล่นเพื่อปลดล็อค" autocomplete="off">
                <button class="enter-btn" onclick="unlock()">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
        <p id="live-time-login" style="position: absolute; bottom: 50px; color: white; font-size: 40px; font-weight: 300;"></p>
    </div>

    <div id="desktop">
        <div class="icon" onclick="openWindow('quiz-win')">
            <i class="fas fa-location-dot" style="color: #74ebd5;"></i>
            <span>Distance</span>
        </div>
        <div class="icon" onclick="openWindow('cake-win')">
            <i class="fas fa-cake-candles" style="color: #ff9a9e;"></i>
            <span>Gift</span>
        </div>
        <div class="icon" onclick="openWindow('msg-win')">
            <i class="fas fa-heart" style="color: #f6d365;"></i>
            <span>Message</span>
        </div>
    </div>

    <div id="quiz-win" class="window">
        <div class="window-header"><span>Location Tracker</span><div class="close-btn" onclick="closeWindow('quiz-win')"></div></div>
        <div class="window-body" style="padding: 25px; text-align: center;">
            <p>ทายซิ... ระยะทางจากระยอง <br>มาถึงใจเธอคือ "กี่กิโลเมตร"?</p>
            <input type="number" id="distInput" style="width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #ddd; text-align: center;">
            <button onclick="checkDist()" style="width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer;">Check Answer</button>
            <p id="hint" style="color: #ff5f56; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="cake-win" class="window">
        <div class="window-header"><span>Birthday Surprise</span><div class="close-btn" onclick="closeWindow('cake-win')"></div></div>
        <div class="window-body" style="padding: 20px; text-align: center;">
            <h3>HBD นะคะคนเก่ง! 🎂</h3>
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3hpeXN2ejN6ZzI2ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6JmNoYz1n/MCG263dfe91ONF5d54/giphy.gif" style="width:100%; border-radius:15px;">
            <p>เค้กมะพร้าว <b>Chowchercof</b> อร่อยไหมเอ่ย ❤️</p>
        </div>
    </div>

    <div id="msg-win" class="window">
        <div class="window-header"><span>Secret Note</span><div class="close-btn" onclick="closeWindow('msg-win')"></div></div>
        <div class="window-body" style="padding: 25px;">
            <p>เขียนความในใจของคุณลงตรงนี้ได้เลย...</p>
        </div>
    </div>

    <div id="dock">
        <div class="dock-item" onclick="openWindow('quiz-win')"><i class="fas fa-compass"></i></div>
        <div class="dock-item" onclick="openWindow('cake-win')"><i class="fas fa-gift"></i></div>
        <div class="dock-item" onclick="openWindow('msg-win')"><i class="fas fa-comment-heart"></i></div>
    </div>

    <script>
        // ระบบปลดล็อค
        function unlock() {
            const name = document.getElementById('passInput').value;
            if(name.trim() !== "") {
                const screen = document.getElementById('login-screen');
                screen.style.transform = 'translateY(-100%)';
                screen.style.opacity = '0';
                setTimeout(() => screen.classList.add('hidden'), 800);
            }
        }
        
        document.getElementById('passInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') unlock();
        });

        // ระบบหน้าต่าง
        function openWindow(id) { document.getElementById(id).style.display = 'flex'; }
        function closeWindow(id) { document.getElementById(id).style.display = 'none'; }

        // ระบบ Quiz
        function checkDist() {
            const val = document.getElementById('distInput').value;
            const target = 145; // เปลี่ยนระยะทางที่นี่
            if(parseInt(val) === target) {
                alert("เก่งมาก! ถูกต้องครับ 🎉");
                openWindow('cake-win');
                closeWindow('quiz-win');
            } else {
                document.getElementById('hint').innerText = val > target ? "ไกลไปนิด ลองใหม่!" : "ใกล้ไปหน่อย ลองใหม่!";
            }
        }

        // อัปเดตเวลา
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('live-time-login').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
