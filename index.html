<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Space: LOG 01 🌌</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&family=Prompt:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* สไตล์เดิมทั้งหมด (ตัดออกเพื่อความกระชับ) */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Prompt', sans-serif;
            background: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=2071') no-repeat center center fixed;
            background-size: cover;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 550px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .screen { display: none; opacity: 0; transition: opacity 0.5s ease, transform 0.5s ease; transform: translateY(15px); }
        .screen.active { display: flex; flex-direction: column; align-items: center; opacity: 1; transform: translateY(0); width: 100%; }
        .cover-icon { font-size: 60px; margin-bottom: 20px; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        h1 { font-family: 'Kanit', sans-serif; font-size: 1.5rem; color: #f8fafc; margin-bottom: 15px; font-weight: 500; line-height: 1.4; letter-spacing: 1px;}
        p.subtitle { color: #cbd5e1; font-size: 0.95rem; margin-bottom: 35px; line-height: 1.7; font-weight: 300;}
        .btn-main { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.3); padding: 16px 30px; font-size: 1.05rem; border-radius: 12px; font-family: 'Kanit'; font-weight: 400; cursor: pointer; transition: all 0.3s ease; width: 100%; letter-spacing: 1px; }
        .btn-main:hover, .btn-main:active { background: rgba(255, 255, 255, 0.9); color: #0f172a; transform: scale(0.98); }
        .progress-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .q-number { font-family: 'Prompt'; font-weight: 400; font-size: 0.95rem; color: #94a3b8; letter-spacing: 1px;}
        .progress-bar { width: 75%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; background: #fff; transition: width 0.4s ease; }
        .question-text { font-family: 'Kanit', sans-serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 30px; line-height: 1.6; color: #f8fafc; text-align: left; width: 100%; }
        .choices-wrapper { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .choice-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); color: #e2e8f0; padding: 18px 20px; font-size: 0.95rem; border-radius: 12px; font-family: 'Prompt'; font-weight: 300; cursor: pointer; transition: all 0.3s ease; width: 100%; text-align: left; line-height: 1.5; }
        .choice-btn:hover, .choice-btn:active { border-color: rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.15); color: #fff; }
        .radar-box { position: relative; width: 70px; height: 70px; margin: 0 auto 30px; }
        .radar-circle { width: 100%; height: 100%; border: 1px dashed rgba(255, 255, 255, 0.4); border-radius: 50%; animation: spin 4s linear infinite; }
        .radar-core { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 15px; height: 15px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.5; } }
        .loading-text { font-size: 1.1rem; color: #fff; font-family: 'Kanit'; font-weight: 400; margin-bottom: 10px; letter-spacing: 1px;}
        .loading-subtext { font-size: 0.9rem; color: #94a3b8; font-weight: 300; }
        .result-type { font-family: 'Prompt'; font-size: 0.85rem; color: #94a3b8; margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase;}
        .result-title { font-family: 'Kanit', sans-serif; font-size: 1.6rem; color: #f8fafc; font-weight: 500; margin-bottom: 25px; line-height: 1.4; }
        .result-card { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; padding: 25px; margin-bottom: 30px; width: 100%; text-align: left; }
        .result-desc { font-size: 0.95rem; color: #cbd5e1; line-height: 1.8; font-weight: 300; }
        .highlight { color: #fff; font-weight: 500; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="screen-start" class="screen active">
            <div class="cover-icon">🚀</div>
            <h1>SPACE MISSION</h1>
            <p class="subtitle">คุณถูกรับเลือกให้เป็นนักบินอวกาศ<br>มาเริ่มจำลองสถานการณ์ภารกิจกัน!</p>
            <button class="btn-main" onclick="startQuiz()">INITIATE LAUNCH</button>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="progress-header">
                <span class="q-number" id="q-counter">LOG 01/07</span>
                <div class="progress-bar"><div id="progress" class="progress-fill" style="width: 0%;"></div></div>
            </div>
            <div id="question-text" class="question-text"></div>
            <div id="choices-container" class="choices-wrapper"></div>
        </div>

        <div id="screen-loading" class="screen">
            <div class="radar-box"><div class="radar-circle"></div><div class="radar-core"></div></div>
            <div class="loading-text" id="loading-msg">กำลังวิเคราะห์ข้อมูล...</div>
        </div>

        <div id="screen-result" class="screen">
            <div class="result-type">STATUS: ANOMALY DETECTED</div>
            <h2 class="result-title">ตรวจพบ 'วัตถุลึกลับ'! ☄️</h2>
            <div class="result-card">
                <div class="result-desc">
                    ภารกิจสำเร็จ! แต่เรดาร์แจ้งเตือนว่า... มี <span class="highlight">วัตถุลึกลับบางอย่าง</span> 
                    พุ่งลงมาจอดที่หน้า <span class="highlight">ฐานลาดกระบัง (หอพักของคุณ)</span> เรียบร้อยแล้ว!
                </div>
            </div>
            <button class="btn-main" onclick="alert('แต่งตัวให้เรียบร้อย แล้วลงไปตรวจสอบด่วนเลย! 🚀')">รับทราบภารกิจ</button>
        </div>

    </div>

    <script>
        let bgMusic = null;

        const questions = [
            {
                q: "ระบบเตรียมพร้อมปล่อยยาน! เพื่อลดความตื่นเต้น คุณจะเลือกเปิดเพลงแนวไหนคลอไปตลอดการเดินทาง?",
                choices: [
                    // แก้ไขชื่อไฟล์เพลงตามที่คุณอัปโหลดขึ้น GitHub ได้เลยครับ
                    { text: "เพียงยิ้ม", audio: "- WINN CHANON Official Audio.mp3" }, 
                    { text: "ชั่วโมงต้องมนต์", audio: "Magic Moment  Friday Official Audio.mp3" },
                    { text: "นี่ฉันเอง", audio: "PURPEECH -  Its me Official MV.mp3" }
                ]
            },
            {
                q: "เพื่อความคล่องตัวในสภาวะไร้น้ำหนัก คุณเลือกสวมเสื้อยืดปฏิบัติการด้านในเป็นสีอะไร?",
                choices: [
                    { text: "สีเขียวหรือสีฟ้าคุมโทน" },
                    { text: "สีดำสนิท กลมกลืนกับอวกาศ" },
                    { text: "สีขาวล้วน มินิมอลที่สุด" }
                ]
            },
            {
                q: "ยานพุ่งทะยานออกไป สิ่งแรกที่คุณสังเกตเห็นนอกหน้าต่างคืออะไร?",
                choices: [
                    { text: "กลุ่มเนบิวลาหลากสีสวยงาม" },
                    { text: "ความมืดมิดที่เงียบสงบ" },
                    { text: "สะเก็ดดาวตกที่ส่องแสงวาบ" }
                ]
            },
            {
                q: "มีกลุ่มอุกกาบาตขวางทาง! คุณจะทำอย่างไร?",
                choices: [
                    { text: "ยิงพลังคลื่นเต่าใส่เลยแบบโกคู!" },
                    { text: "โยกหลบด้วยทักษะระดับเซียน" },
                    { text: "เปิดบาเรียแล้วพุ่งชนตรงๆ" }
                ]
            },
            {
                q: "ลงจอดบนดาวดวงใหม่สำเร็จ สิ่งแรกที่คุณพบคือพืชต่างดาว...",
                choices: [
                    { text: "ดอกไม้สีฟ้าและม่วงเรืองแสง" },
                    { text: "ป่าเห็ดคริสตัลระยิบระยับ" },
                    { text: "ต้นไม้ยักษ์ใบสีเงิน" }
                ]
            },
            {
                q: "ระบบ 'PatrolSat' แจ้งเตือนพัสดุลึกลับกำลังพุ่งมา คุณคิดว่ามันคืออะไร?",
                choices: [
                    { text: "สัญญาณจากสิ่งมีชีวิตอื่น" },
                    { text: "ชิ้นส่วนดาวตก" },
                    { text: "วัตถุปริศนาที่ใครบางคนตั้งใจส่งมา" }
                ]
            },
            {
                q: "วัตถุนั้นลงจอดที่เป้าหมายแล้ว คุณจะทำอย่างไร?",
                choices: [
                    { text: "วิ่งออกไปดูเดี๋ยวนี้เลย!" },
                    { text: "แอบสังเกตการณ์ในที่ปลอดภัย" },
                    { text: "ส่งสัญญาณสื่อสารกลับไป" }
                ]
            }
        ];

        let currentQuestion = 0;

        function transitionScreen(hideId, showId) {
            const hideEl = document.getElementById(hideId);
            const showEl = document.getElementById(showId);
            hideEl.style.opacity = '0';
            setTimeout(() => {
                hideEl.classList.remove('active');
                showEl.classList.add('active');
                void showEl.offsetWidth; 
                showEl.style.opacity = '1';
            }, 500);
        }

        function startQuiz() {
            currentQuestion = 0;
            transitionScreen('screen-start', 'screen-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            const qData = questions[currentQuestion];
            document.getElementById('q-counter').innerText = `LOG ${(currentQuestion + 1).toString().padStart(2, '0')}/07`;
            document.getElementById('question-text').innerText = qData.q;
            document.getElementById('progress').style.width = `${(currentQuestion / questions.length) * 100}%`;

            const choicesContainer = document.getElementById('choices-container');
            choicesContainer.innerHTML = ''; 

            qData.choices.forEach((choice) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = choice.text;
                btn.onclick = () => handleAnswer(choice.audio);
                choicesContainer.appendChild(btn);
            });
        }

        function handleAnswer(audioSrc) {
            if (audioSrc) {
                if (bgMusic) { bgMusic.pause(); } 
                bgMusic = new Audio(audioSrc);
                bgMusic.loop = true; 
                bgMusic.volume = 0.5; 
                bgMusic.play().catch(e => console.log("ต้องการการคลิกก่อนเล่นเพลง"));
            }

            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                document.getElementById('progress').style.width = `100%`;
                transitionScreen('screen-quiz', 'screen-loading');
                setTimeout(() => transitionScreen('screen-loading', 'screen-result'), 3000);
            }
        }
    </script>
</body>
</html>
