<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday OS 🥥✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;400&family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-blue: #e3f2fd; /* สีฟ้าอ่อนพาสเทล */
            --win-blue: #0078d4;
            --text-dark: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Prompt', sans-serif;
            overflow: hidden;
            background-color: var(--bg-blue);
        }

        /* --- [หน้า 1: Simple Lock Screen] --- */
        #login-screen {
            position: fixed; inset: 0;
            background-color: var(--bg-blue);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; transition: transform 0.6s ease-in-out, opacity 0.6s;
            color: var(--text-dark);
        }

        .user-profile {
            width: 120px; height: 120px;
            background: white;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 70px; color: #bbdefb;
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .login-box h2 {
            font-size: 2rem; margin: 0 0 20px 0; font-weight: 400;
        }

        .login-input-group {
            display: flex; align-items: center; gap: 5px;
            background: white;
            padding: 5px 5px 5px 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
            width: 280px;
        }

        #passInput {
            background: transparent; border: none; color: var(--text-dark);
            font-size: 20px; outline: none; width: 100%;
            text-align: left; letter-spacing: 4px;
        }
        #passInput::placeholder { color: #aaa; letter-spacing: normal; font-size: 15px; }

        .enter-btn {
            width: 35px; height: 35px; border-radius: 4px;
            border: none; background: #eee; color: #666;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: 0.2s;
        }
        .enter-btn:hover { background: var(--win-blue); color: white; }

        .hint-text { font-size: 0.9rem; opacity: 0.6; margin-top: 15px; font-family: 'Itim'; }

        /* --- [ส่วนเวลาด้านล่าง] --- */
        .lock-info {
            position: absolute; bottom: 60px; text-align: center;
        }
        #live-time { font-size: 5rem; margin: 0; font-weight: 200; }
        .date-info { font-size: 1.3rem; margin: 0; font-weight: 200; opacity: 0.7; }

        /* --- [Desktop Area] --- */
        #desktop {
            height: 100%; padding: 30px; 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            grid-auto-rows: 100px; gap: 20px;
        }

        .icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon-box {
            width: 60px; height: 60px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; color: white; margin-bottom: 8px;
            background: white; border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .icon span { font-family: 'Itim'; color: #555; font-size: 14px; }

        /* --- Windows --- */
        .window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 380px; background: white; border-radius: 8px;
            display: none; flex-direction: column; z-index: 100;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 1px solid #ddd;
        }
        .window-header { padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; border-radius: 8px 8px 0 0; }
        .close-btn { width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #999; }
        .close-btn:hover { background: #e81123; color: white; border-radius: 0 8px 0 0; }
        .window-body { padding: 30px; text-align: center; color: #444; font-family: 'Itim'; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="user-profile"><i class="fas fa-user"></i></div>
        <div class="login-box" style="text-align: center;">
            <h2>ยินดีต้อนรับ</h2>
            <div class="login-input-group">
                <input type="password" id="passInput" placeholder="Password" autocomplete="off">
                <button class="enter-btn" onclick="unlockOS()">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            <p class="hint-text">รหัสผ่านคือวันเกิด (วว/ดด/พศ)</p>
        </div>
        
        <div class="lock-info">
            <p id="live-time">00:00</p>
            <p class="date-info">วันอังคารที่ 7 เมษายน 2569</p>
        </div>
    </div>

    <div id="desktop">
        <div class="icon" onclick="openWindow('quiz-win')">
            <div class="icon-box"><i class="fas fa-compass" style="color: #4fc3f7;"></i></div>
            <span>Distance</span>
        </div>
        <div class="icon" onclick="openWindow('cake-win')">
            <div class="icon-box"><i class="fas fa-birthday-cake" style="color: #ff8b8b;"></i></div>
            <span>Surprise</span>
        </div>
    </div>

    <div id="quiz-win" class="window">
        <div class="window-header"><span style="font-size: 0.8rem; color:#888;">Distance Tracker</span><div class="close-btn" onclick="closeWindow('quiz-win')">×</div></div>
        <div class="window-body">
            <p style="font-size: 1.2rem;">ทายซิ... ระยะทางจากระยอง <br>มาถึงใจเธอคือ "กี่กิโลเมตร"?</p>
            <input type="number" id="distInput" style="width:100%; padding:12px; border-radius:4px; border:1px solid #ddd; text-align:center; margin-bottom:15px;" placeholder="0">
            <button onclick="checkDist()" style="width:100%; padding:10px; border-radius:4px; border:none; background:var(--win-blue); color:white; cursor:pointer;">ตรวจสอบ</button>
            <p id="hint" style="color:#e81123; margin-top:10px;"></p>
        </div>
    </div>

    <div id="cake-win" class="window">
        <div class="window-header"><span style="font-size: 0.8rem; color:#888;">Surprise</span><div class="close-btn" onclick="closeWindow('cake-win')">×</div></div>
        <div class="window-body">
            <h3>HBD นะคะคนเก่ง! 🎂</h3>
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3hpeXN2ejN6ZzI2ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6JmNoYz1n/MCG263dfe91ONF5d54/giphy.gif" style="width:100%; border-radius:4px;">
            <p>เค้กมะพร้าวอร่อยไหมเอ่ย ❤️</p>
        </div>
    </div>

    <script>
        function unlockOS() {
            const pass = document.getElementById('passInput').value;
            if(pass === "07/04/2550") {
                const screen = document.getElementById('login-screen');
                screen.style.transform = 'translateY(-100%)';
                screen.style.opacity = '0';
                setTimeout(() => screen.classList.add('hidden'), 600);
            } else {
                alert("รหัสผ่านไม่ถูกต้องน้าา ลองใหม่ครับ!");
            }
        }
        
        document.getElementById('passInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') unlockOS();
        });

        function openWindow(id) { document.getElementById(id).style.display = 'flex'; }
        function closeWindow(id) { document.getElementById(id).style.display = 'none'; }

        function checkDist() {
            const val = document.getElementById('distInput').value;
            if(parseInt(val) === 145) {
                alert("ถูกต้องครับ! 🎉");
                openWindow('cake-win');
                closeWindow('quiz-win');
            } else {
                document.getElementById('hint').innerText = val > 145 ? "ไกลไปนิด ลองใหม่!" : "ใกล้ไปหน่อย ลองใหม่!";
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
