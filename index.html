<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secret Delivery 🚗💨</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            font-family: 'Prompt', sans-serif;
            background: #a1c4fd;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header --- */
        .header {
            width: 100%; padding: 15px; text-align: center;
            background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .header h1 { font-size: 1.2rem; color: #333; }
        .distance-display { font-size: 1.8rem; font-weight: 600; color: #0078d4; }

        /* --- Game Area --- */
        #game-container {
            position: relative;
            width: 100%; max-width: 400px;
            flex-grow: 1;
            background: #555; /* สีถนน */
            overflow: hidden;
            border-left: 5px solid #888;
            border-right: 5px solid #888;
        }

        /* เส้นปะกลางถนน */
        .lane-divider {
            position: absolute; top: -100px; width: 4px; height: 100px; background: white;
            box-shadow: 0 150px white, 0 300px white, 0 450px white, 0 600px white, 0 750px white;
            animation: moveLines 0.5s linear infinite;
        }
        .lane-1 { left: 33%; }
        .lane-2 { left: 66%; }

        @keyframes moveLines { from { top: -100px; } to { top: 50px; } }

        /* รถของเรา */
        #player {
            position: absolute; bottom: 80px; width: 50px; height: 80px;
            font-size: 50px; line-height: 80px; text-align: center;
            /* ตำแหน่งเริ่มต้นเลนกลาง */
            left: 50%; transform: translateX(-50%);
            transition: left 0.15s ease-out; /* ทำให้รถเปลี่ยนเลนสมูทๆ */
            z-index: 5;
        }

        /* สิ่งกีดขวาง */
        .obstacle {
            position: absolute; top: -60px; width: 50px; height: 50px;
            font-size: 40px; text-align: center; line-height: 50px;
            transform: translateX(-50%);
            z-index: 4;
        }

        /* --- Controls --- */
        .controls {
            width: 100%; max-width: 400px; display: flex;
            background: white; padding: 15px; box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .btn {
            flex: 1; padding: 20px; margin: 0 5px; font-size: 24px;
            border: none; border-radius: 15px; background: #e3f2fd;
            color: #0078d4; cursor: pointer; box-shadow: 0 4px 0 #bbdefb;
            transition: 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        /* --- Screens --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: white; text-align: center; padding: 20px;
        }
        .hidden { display: none !important; }

        .box { background: white; color: #333; padding: 30px; border-radius: 20px; max-width: 350px; width: 100%; }
        .box h2 { font-size: 1.8rem; margin-bottom: 10px; color: #0078d4; }
        .box p { font-size: 1.1rem; margin-bottom: 20px; }
        .action-btn { padding: 12px 25px; font-size: 1.2rem; border: none; border-radius: 10px; background: #ff6b81; color: white; cursor: pointer; font-family: 'Prompt'; font-weight: 600; width: 100%; }

        /* ป๊อปอัปตอนชนะ */
        #win-box { border: 4px solid #ff6b81; }
        #win-box h2 { color: #ff6b81; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ภารกิจส่งของลับ 📦</h1>
        <div class="distance-display" id="score">0 / 145 กม.</div>
    </div>

    <div id="game-container">
        <div class="lane-divider lane-1"></div>
        <div class="lane-divider lane-2"></div>
        <div id="player">🚗</div>
    </div>

    <div class="controls">
        <button class="btn" onclick="moveLeft()"><i class="fas fa-arrow-left"></i> ซ้าย</button>
        <button class="btn" onclick="moveRight()">ขวา <i class="fas fa-arrow-right"></i></button>
    </div>

    <div id="start-screen" class="overlay">
        <div class="box">
            <h2>พร้อมไหม?</h2>
            <p>ช่วยขับรถไปให้ถึง <b>145 กิโลเมตร</b><br>หลบกรวยและหินให้ดีๆ ล่ะ!</p>
            <button class="action-btn" onclick="startGame()">Start Game 🏁</button>
        </div>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <div class="box">
            <h2 style="color: #e81123;">ชนซะแล้ว! 💥</h2>
            <p>ของยังไม่ถึงมือเลย เอาใหม่ๆ ใจเย็นๆ</p>
            <button class="action-btn" style="background: #0078d4;" onclick="startGame()">ลองอีกครั้ง 🔄</button>
        </div>
    </div>

    <div id="win-screen" class="overlay hidden">
        <div class="box" id="win-box">
            <h2>ถึงเป้าหมายแล้ว! 🎉</h2>
            <div style="font-size: 60px; margin: 10px 0; animation: pop 0.5s ease-out;">🎁</div>
            <p>มีคนมาส่ง <b>"ของความลับ"</b> ให้แล้วนะ!</p>
            <p style="font-weight: 600; color: #e81123; font-size: 1.2rem;">รีบแต่งตัวลงไปรับของเร็วเข้า! 🏃‍♀️💨</p>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const gameContainer = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');
        
        let currentLane = 1; // เลน: 0 (ซ้าย), 1 (กลาง), 2 (ขวา)
        const lanePositions = [16.5, 50, 83.5]; // เปอร์เซ็นต์ความกว้างซ้าย กลาง ขวา
        
        let gameInterval;
        let obstacleInterval;
        let distance = 0;
        const targetDistance = 145; // เป้าหมายชนะที่ 145
        let isGameRunning = false;

        // อาร์เรย์สิ่งกีดขวาง (สุ่มออกมา)
        const obstacles = ['🚧', '🪨', '🛑'];

        // บังคับรถ
        function moveLeft() {
            if (currentLane > 0 && isGameRunning) {
                currentLane--;
                updatePlayerPosition();
            }
        }

        function moveRight() {
            if (currentLane < 2 && isGameRunning) {
                currentLane++;
                updatePlayerPosition();
            }
        }

        function updatePlayerPosition() {
            player.style.left = lanePositions[currentLane] + '%';
        }

        // เริ่มเกม
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            
            // ล้างสิ่งกีดขวางเก่า
            document.querySelectorAll('.obstacle').forEach(obs => obs.remove());
            
            distance = 0;
            currentLane = 1;
            updatePlayerPosition();
            scoreDisplay.innerText = `0 / ${targetDistance} กม.`;
            isGameRunning = true;

            // Loop เพิ่มระยะทาง
            gameInterval = setInterval(() => {
                distance++;
                scoreDisplay.innerText = `${distance} / ${targetDistance} กม.`;
                
                if (distance >= targetDistance) {
                    winGame();
                }
            }, 100); // ความเร็วในการเพิ่มระยะ (100ms = 1 กม. จะใช้เวลาประมาณ 14.5 วินาที)

            // Loop สร้างสิ่งกีดขวาง
            obstacleInterval = setInterval(createObstacle, 800); // ปล่อยของทุก 0.8 วิ (ระดับง่าย)
        }

        // สร้างสิ่งกีดขวาง
        function createObstacle() {
            if (!isGameRunning) return;

            const obs = document.createElement('div');
            obs.classList.add('obstacle');
            obs.innerText = obstacles[Math.floor(Math.random() * obstacles.length)];
            
            // สุ่มเลน
            const randomLane = Math.floor(Math.random() * 3);
            obs.style.left = lanePositions[randomLane] + '%';
            obs.style.top = '-60px'; // เริ่มจากขอบบน
            
            gameContainer.appendChild(obs);

            // ทำให้สิ่งกีดขวางตกลงมา
            let obsTop = -60;
            const fallInterval = setInterval(() => {
                if (!isGameRunning) {
                    clearInterval(fallInterval);
                    return;
                }

                obsTop += 10; // ความเร็วของสิ่งกีดขวาง
                obs.style.top = obsTop + 'px';

                // ตรวจสอบการชน (Collision)
                const playerRect = player.getBoundingClientRect();
                const obsRect = obs.getBoundingClientRect();

                // ลดขนาดกล่องชนให้เล็กลงนิดหน่อย จะได้ไม่ชนง่ายเกินไป (ใจดี)
                if (
                    obsRect.bottom - 15 > playerRect.top &&
                    obsRect.top + 15 < playerRect.bottom &&
                    obsRect.right - 15 > playerRect.left &&
                    obsRect.left + 15 < playerRect.right
                ) {
                    clearInterval(fallInterval);
                    gameOver();
                }

                // ลบสิ่งกีดขวางเมื่อเลยขอบล่างไปแล้ว
                if (obsTop > gameContainer.offsetHeight) {
                    clearInterval(fallInterval);
                    obs.remove();
                }
            }, 20); // อัปเดตทุก 20ms
        }

        // จบเกม (แพ้)
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameInterval);
            clearInterval(obstacleInterval);
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        // จบเกม (ชนะ)
        function winGame() {
            isGameRunning = false;
            clearInterval(gameInterval);
            clearInterval(obstacleInterval);
            
            // ทำให้เส้นถนนหยุดขยับ
            document.querySelectorAll('.lane-divider').forEach(el => el.style.animationPlayState = 'paused');
            
            setTimeout(() => {
                document.getElementById('win-screen').classList.remove('hidden');
            }, 500); // หน่วงเวลาครึ่งวิให้ชัวร์ว่าชนะแล้ว
        }

    </script>
</body>
</html>
