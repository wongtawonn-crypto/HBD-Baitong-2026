<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday OS 🥥✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff8b8b;
            --win-blue: #0078d7;
            --glass: rgba(255, 255, 255, 0.15);
            --window-bg: rgba(255, 255, 255, 0.9);
            --text-color: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Itim', cursive;
            overflow: hidden;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            background-size: cover;
        }

        /* --- [หน้า 1: Windows Lock Screen] --- */
        #login-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #0078d7 0%, #004578 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s;
            color: white;
        }

        .user-profile {
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; color: white;
            border: 2px solid rgba(255,255,255,0.3);
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 300;
            font-family: 'Kanit', sans-serif;
        }

        .login-input-group {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 5px 5px 5px 20px;
            border-radius: 8px; /* ปรับให้ดูเป็นเหลี่ยมแบบ Windows มากขึ้น */
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
            margin-bottom: 10px;
        }

        #passInput {
            background: transparent; border: none; color: white;
            font-family: 'sans-serif'; font-size: 18px; outline: none; width: 220px;
            text-align: center; letter-spacing: 3px;
        }
        #passInput::placeholder { color: rgba(255,255,255,0.5); letter-spacing: normal; font-family: 'Itim'; }

        .enter-btn {
            width: 40px; height: 40px; border-radius: 4px;
            border: none; background: rgba(255,255,255,0.9); color: var(--win-blue);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: 0.3s; font-size: 18px;
        }
        .enter-btn:hover { background: var(--primary); color: white; }

        .hint-text { font-size: 0.9rem; opacity: 0.7; font-weight: 300; }

        /* --- [หน้า 2: Desktop Area] --- */
        #desktop {
            height: calc(100% - 70px);
            padding: 30px 20px; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            grid-auto-rows: 95px; gap: 20px; align-content: start;
        }

        .icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .icon-box {
            width: 65px; height: 65px; border-radius: 18px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; color: white; margin-bottom: 8px;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .icon span { color: white; font-size: 13px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); background: rgba(0,0,0,0.15); padding: 2px 10px; border-radius: 10px; }

        /* --- Windows --- */
        .window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: var(--window-bg); border-radius: 20px;
            display: none; flex-direction: column; z-index: 100;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); backdrop-filter: blur(10px);
        }
        .window-header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .close-btn { width: 12px; height: 12px; background: #ff5f56; border-radius: 50%; cursor: pointer; }
        .window-body { padding: 25px; text-align: center; color: var(--text-color); }

        #dock {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.2); backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 25px; display: flex; gap: 15px;
            border: 1px solid rgba(255,255,255,0.2); z-index: 500;
        }
        .dock-item { width: 48px; height: 48px; border-radius: 14px; display: flex; justify-content: center; align-items: center; color: white; font-size: 22px; cursor: pointer; background: rgba(255,255,255,0.1); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="user-profile"><i class="fas fa-user-circle"></i></div>
        <div class="login-box" style="text-align: center;">
            <h2>ยินดีต้อนรับ</h2>
            <div class="login-input-group">
                <input type="password" id="passInput" placeholder="Password" autocomplete="off">
                <button class="enter-btn" onclick="unlockOS()">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            <p class="hint-text">รหัสผ่านคือวันเกิด (วว/ดด/พศ)</p>
        </div>
        <div style="position: absolute; bottom: 40px; text-align: center; opacity: 0.7;">
            <p id="live-time" style="font-size: 3rem; margin: 0; font-family: 'Kanit', sans-serif; font-weight: 300;"></p>
            <p style="font-size: 1.1rem; margin: 0;">Saturday, 7 April</p>
        </div>
    </div>

    <div id="desktop">
        <div class="icon" onclick="openWindow('quiz-win')">
            <div class="icon-box"><i class="fas fa-compass" style="color: #74ebd5;"></i></div>
            <span>Distance</span>
        </div>
        <div class="icon" onclick="openWindow('cake-win')">
            <div class="icon-box"><i class="fas fa-birthday-cake" style="color: #ff9a9e;"></i></div>
            <span>Cake</span>
        </div>
        <div class="icon" onclick="openWindow('msg-win')">
            <div class="icon-box"><i class="fas fa-heart" style="color: #f6d365;"></i></div>
            <span>Message</span>
        </div>
    </div>

    <div id="dock">
        <div class="dock-item" onclick="openWindow('quiz-win')"><i class="fas fa-map-marker-alt"></i></div>
        <div class="dock-item" onclick="openWindow('cake-win')"><i class="fas fa-gift"></i></div>
        <div class="dock-item" onclick="openWindow('msg-win')"><i class="fas fa-comment-heart"></i></div>
    </div>

    <div id="quiz-win" class="window">
        <div class="window-header"><b>Distance Tracker</b><div class="close-btn" onclick="closeWindow('quiz-win')"></div></div>
        <div class="window-body">
            <p>ทายซิ... ระยะทางจากระยอง <br>มาถึงใจเธอคือ "กี่กิโลเมตร"?</p>
            <input type="number" id="distInput" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; text-align:center; margin-bottom:15px;" placeholder="0">
            <button onclick="checkDist()" style="width:100%; padding:12px; border-radius:10px; border:none; background:var(--primary); color:white; font-weight:bold; cursor:pointer;">Check</button>
            <p id="hint" style="color:#ff5f56; margin-top:10px;"></p>
        </div>
    </div>

    <div id="cake-win" class="window">
        <div class="window-header"><b>Surprise!</b><div class="close-btn" onclick="closeWindow('cake-win')"></div></div>
        <div class="window-body">
            <h3>HBD นะคะคนเก่ง! 🎂</h3>
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3hpeXN2ejN6ZzI2ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6JmNoYz1n/MCG263dfe91ONF5d54/giphy.gif" style="width:100%; border-radius:15px;">
            <p>เค้กมะพร้าวอร่อยไหมเอ่ย ❤️</p>
        </div>
    </div>

    <div id="msg-win" class="window">
        <div class="window-header"><b>Message</b><div class="close-btn" onclick="closeWindow('msg-win')"></div></div>
        <div class="window-body"><p>มีความสุขมากๆ นะครับคนดี ❤️</p></div>
    </div>

    <script>
        function unlockOS() {
            const pass = document.getElementById('passInput').value;
            const target = "07/04/2550"; // รหัสผ่านที่ตั้งไว้
            if(pass === target) {
                const screen = document.getElementById('login-screen');
                screen.style.transform = 'translateY(-100%)';
                screen.style.opacity = '0';
                setTimeout(() => screen.classList.add('hidden'), 800);
            } else {
                alert("รหัสผ่านไม่ถูกต้องน้าา ลองใหม่ครับ!");
            }
        }
        
        document.getElementById('passInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') unlockOS();
        });

        function openWindow(id) { document.getElementById(id).style.display = 'flex'; }
        function closeWindow(id) { document.getElementById(id).style.display = 'none'; }

        function checkDist() {
            const val = document.getElementById('distInput').value;
            const target = 145; 
            if(parseInt(val) === target) {
                alert("ถูกต้องครับ! 🎉");
                openWindow('cake-win');
                closeWindow('quiz-win');
            } else {
                document.getElementById('hint').innerText = val > target ? "ไกลไปนิด ลองใหม่!" : "ใกล้ไปหน่อย ลองใหม่!";
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
