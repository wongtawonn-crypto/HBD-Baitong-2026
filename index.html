<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cake Delivery 🛵🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Prompt', sans-serif;
            background: #f0f8ff; /* สีฟ้าอ่อนสบายตา */
            /* ตั้งความสูงให้ยาวๆ เพื่อให้มีพื้นที่เลื่อนจอ (Scroll) */
            height: 400vh; 
            overflow-x: hidden;
        }

        /* --- [ส่วนหัวข้อที่ติดอยู่ด้านบน] --- */
        .header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px; text-align: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .header h1 { font-size: 1.5rem; color: #ff6b81; font-weight: 600; }
        .header p { font-size: 1rem; color: #555; margin-top: 5px; }

        /* --- [ส่วนอนิเมชั่นรถและถนน (จะถูก Fix ให้อยู่กลางจอเสมอ)] --- */
        .journey-container {
            position: fixed; top: 50%; left: 0; width: 100%;
            transform: translateY(-50%);
            padding: 20px; z-index: 50;
        }

        /* ตัวเลขระยะทาง */
        .distance-counter {
            text-align: center; font-size: 3rem; font-weight: 600;
            color: #0078d4; margin-bottom: 10px;
        }
        .distance-counter span { font-size: 1.2rem; color: #888; font-weight: 300; }

        /* ข้อความบอกสถานะระหว่างทาง */
        .status-text {
            text-align: center; font-size: 1.1rem; color: #666;
            height: 30px; margin-bottom: 40px; font-weight: 300;
        }

        /* ถนน */
        .road {
            position: relative; width: 90%; max-width: 600px;
            height: 6px; background: #ddd; border-radius: 10px;
            margin: 0 auto;
        }

        /* รถส่งของ */
        .delivery-car {
            position: absolute; top: -35px; left: 0%;
            font-size: 40px; 
            /* รถจะขยับไปทางขวาตามเปอร์เซ็นต์ */
            transform: translateX(-50%);
            transition: left 0.1s ease-out;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
        }

        /* จุดเริ่มต้นและจุดหมาย */
        .marker { position: absolute; top: 15px; font-size: 0.8rem; color: #999; font-weight: 600; }
        .marker.start { left: 0; transform: translateX(-50%); }
        .marker.end { right: 0; transform: translateX(50%); }

        /* ลูกศรบอกให้เลื่อนจอ */
        .scroll-indicator {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; color: #ff6b81; font-size: 1rem;
            animation: bounce 1.5s infinite; z-index: 100;
        }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, 10px); } }

        /* --- [หน้าจอ Surprise ตอนจบ (จะโผล่มาเมื่อถึง 145km)] --- */
        #surprise-screen {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.8s ease; text-align: center; padding: 20px;
        }

        #surprise-screen.active { opacity: 1; pointer-events: auto; }

        .surprise-box {
            background: white; padding: 40px 30px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 2px solid #ff6b81;
            max-width: 350px; width: 100%;
        }

        .surprise-box h2 { color: #ff6b81; font-size: 2rem; margin-bottom: 10px; }
        .surprise-box p { color: #555; font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; }
        .cake-img { width: 120px; margin: 10px auto 20px; animation: pop 0.5s ease-out; }

        @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Special Delivery 🎂</h1>
        <p>เลื่อนหน้าจอลงเพื่อส่งเค้กให้ถึงมือ!</p>
    </div>

    <div class="journey-container">
        <div class="distance-counter" id="dist-text">0 <span>กม.</span></div>
        <div class="status-text" id="status-text">กำลังอบเค้กเตรียมออกจากระยอง...</div>
        
        <div class="road">
            <div class="delivery-car" id="car">🛵💨</div>
            <div class="marker start">ระยอง</div>
            <div class="marker end">หอเธอ</div>
        </div>
    </div>

    <div class="scroll-indicator" id="scroll-indicator">
        <p>เลื่อนลงเลยจ้า</p>
        <i class="fas fa-chevron-down"></i><br>
        <i class="fas fa-chevron-down"></i>
    </div>

    <div id="surprise-screen">
        <div class="surprise-box">
            <h2>ถึงแล้ววว! 🎉</h2>
            <img src="https://cdn-icons-png.flaticon.com/512/3248/3248858.png" class="cake-img" alt="Cake">
            <p>เค้กมะพร้าวเดินทาง 145 กิโลเมตร<br>มาถึงหน้าหอพักแล้วนะคะ!</p>
            <p style="font-weight: 600; color: #0078d4; font-size: 1.3rem;">รีบแต่งตัวลงไปเอาเค้กเร็ววว! 🏃‍♀️💨</p>
        </div>
    </div>

    <script>
        const targetDistance = 145; // ระยะทางเป้าหมาย
        
        // จับ Event ตอนผู้ใช้เลื่อนหน้าจอ
        window.addEventListener('scroll', () => {
            // คำนวณเปอร์เซ็นต์การเลื่อน (0 ถึง 100%)
            const scrollTop = document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrollPercent = (scrollTop / scrollHeight) * 100;
            
            // จำกัดค่าไม่ให้เกิน 100% หรือต่ำกว่า 0%
            if(scrollPercent > 100) scrollPercent = 100;
            if(scrollPercent < 0) scrollPercent = 0;

            // อัปเดตตำแหน่งรถ (0% - 100% ของความยาวถนน)
            document.getElementById('car').style.left = scrollPercent + '%';

            // อัปเดตตัวเลขกิโลเมตร
            let currentDist = Math.floor((scrollPercent / 100) * targetDistance);
            document.getElementById('dist-text').innerHTML = currentDist + ' <span>กม.</span>';

            // เปลี่ยนข้อความตามระยะทาง (บิลด์อารมณ์)
            const statusText = document.getElementById('status-text');
            if (currentDist < 20) {
                statusText.innerText = "กำลังแพ็คเค้กออกจากระยองนะ...";
            } else if (currentDist < 60) {
                statusText.innerText = "ขึ้นมอเตอร์เวย์แล้ว เหยียบมิดเลย 🚗💨";
            } else if (currentDist < 100) {
                statusText.innerText = "รถติดนิดหน่อย แต่ใจสู้ครับ!";
            } else if (currentDist < 135) {
                statusText.innerText = "เข้าเขตลาดกระบังแล้ว ใกล้ถึงแล้วน้า~";
            } else if (currentDist < 145) {
                statusText.innerText = "เลี้ยวเข้าซอยหอแล้ว เตรียมตัวๆ 👀";
            } else {
                statusText.innerText = "ถึงแล้วจ้า!";
            }

            // ซ่อนลูกศรเมื่อเริ่มเลื่อน
            if(scrollPercent > 5) {
                document.getElementById('scroll-indicator').style.opacity = '0';
            } else {
                document.getElementById('scroll-indicator').style.opacity = '1';
            }

            // เมื่อถึงระยะหมาย (เลื่อนจอสุด) ให้แสดง Pop-up
            if (scrollPercent === 100) {
                document.getElementById('surprise-screen').classList.add('active');
            } else {
                document.getElementById('surprise-screen').classList.remove('active');
            }
        });
    </script>
</body>
</html>
