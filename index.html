<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday OS 🥥</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Itim', cursive; overflow: hidden; background: #ffafbd; }
        #login-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; transition: 0.5s; }
        .input-group { display: flex; gap: 10px; margin-top: 20px; }
        input { padding: 10px; border-radius: 20px; border: none; text-align: center; outline: none; }
        .enter-btn { background: #ff8b8b; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        #desktop { height: 100%; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, 80px); gap: 20px; }
        .icon { display: flex; flex-direction: column; align-items: center; color: white; cursor: pointer; text-shadow: 1px 1px 2px black; }
        .window { position: absolute; top: 10%; left: 5%; width: 90%; max-width: 350px; background: white; border-radius: 15px; display: none; flex-direction: column; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.3); color: #333; }
        .window-header { background: #eee; padding: 10px; display: flex; justify-content: space-between; border-radius: 15px 15px 0 0; }
        .window-body { padding: 20px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Birthday OS</h2>
        <div class="input-group">
            <input type="text" id="passInput" placeholder="พิมพ์ชื่อเล่น...">
            <button class="enter-btn" onclick="unlock()"><i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <div id="desktop">
        <div class="icon" onclick="openWin('win1')"><i class="fas fa-birthday-cake" style="font-size: 40px;"></i><span>Gift</span></div>
    </div>
