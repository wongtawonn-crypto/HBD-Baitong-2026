<div id="login-screen">
    <div class="login-box">
        <h1 id="live-time">00:00</h1>
        <p style="font-size: 1.2rem; opacity: 0.8;">Saturday, 7 April</p>
        
        <div class="login-input-wrapper" style="display: flex; align-items: center; gap: 10px; margin-top: 25px;">
            <input type="text" id="passInput" placeholder="พิมพ์ชื่อเพื่อปลดล็อค..." 
                   style="padding: 12px 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.4); 
                          background: rgba(255,255,255,0.2); color: white; outline: none; width: 200px; 
                          text-align: center; backdrop-filter: blur(5px);">
            
            <button onclick="unlockOS()" 
                    style="width: 45px; height: 45px; border-radius: 50%; border: none; 
                           background: #ff8b8b; color: white; cursor: pointer; 
                           box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; 
                           justify-content: center; align-items: center; transition: 0.3s;">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
    // ฟังก์ชันปลดล็อค (ใช้ได้ทั้งปุ่มในจอ และปุ่ม Enter บนคีย์บอร์ด)
    function unlockOS() {
        const name = document.getElementById('passInput').value;
        if(name.trim() !== "") {
            document.getElementById('login-screen').style.transform = 'translateY(-100%)';
            document.getElementById('login-screen').style.opacity = '0';
        } else {
            alert("ใส่ชื่อเล่นก่อนน้าา");
        }
    }

    // ฟังก์ชันรองรับคนกด Enter บนคีย์บอร์ดคอมพิวเตอร์
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') unlockOS();
    });
</script>
