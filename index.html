<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday OS 🥥✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff8b8b;
            --win-blue: #0078d7; /* สีฟ้าวินโดว์ */
            --glass: rgba(255, 255, 255, 0.15);
            --window-bg: rgba(255, 255, 255, 0.8);
            --text-color: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Itim', cursive;
            overflow: hidden;
            /* พื้นหลังหน้า Desktop (หลังปลดล็อค) */
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            background-size: cover;
        }

        /* --- [หน้า 1: Windows Lock Screen] --- */
        #login-screen {
            position: fixed; inset: 0;
            /* ใช้พื้นหลังสีฟ้า-น้ำเงินเข้มแบบ Windows */
            background: radial-gradient(circle at center, #0078d7 0%, #004578 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s;
            color: white;
        }

        .user-profile {
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; color: white;
            border: 2px solid rgba(255,255,255,0.3);
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            font-size: 2.2rem; margin: 0 0 30px 0; font-weight: 300; letter-spacing: 1px;
            font-family: 'Kanit', sans-serif;
        }

        .login-input-group {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 5px 5px 5px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }

        #passInput {
            background: transparent; border: none; color: white;
            font-family: 'Itim'; font-size: 18px; outline: none; width: 220px;
            text-align: center;
        }
        #passInput::placeholder { color: rgba(255,255,255,0.6); }

        .enter-btn {
            width: 45px; height: 45px; border-radius: 50%;
            border: none; background: white; color: var(--win-blue);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: 0.3s; font-size: 18px;
        }
        .enter-btn:hover { background: var(--primary); color: white; transform: scale(1.05); }

        /* --- [หน้า 2: Desktop Area] --- */
        #desktop {
            height: calc(100% - 70px);
            padding: 30px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            grid-auto-rows: 95px;
            gap: 20px;
            align-content: start;
        }

        .icon {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .icon:active { transform: scale(0.95); }

        .icon-box {
            width: 65px; height: 65px;
            border-radius: 18px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; color: white;
            margin-bottom: 8px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .icon span {
            color: white; font-size: 13px; font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.15); padding: 2px 10px; border-radius: 10px;
        }

        /* --- Windows (Modern Glassmorphism) --- */
        .window {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 400px;
            background: var(--window-bg); border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            display: none; flex-direction: column;
            overflow: hidden; z-index: 100;
            animation: winPop 0.3s ease-out;
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }
        @keyframes winPop { from { transform: translate(-50%, -45%) scale(0.9); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .window-header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.3);
        }

        .close-btn { 
            width: 14px; height: 14px; background: #ff5f56; border-radius: 50%; cursor: pointer;
            transition: 0.2s;
        }
        .close-btn:hover { transform: scale(1.1); background: #ff3b30; }

        .window-body { padding: 25px; text-align: center; color: var(--text-color); }

        /* --- Taskbar (iOS Style Dock) --- */
        #dock {
            position: fixed; bottom: 15px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 25px;
            display: flex; gap: 15px; border: 1px solid rgba(255,255,255,0.2);
            z-index: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .dock-item {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 22px; cursor: pointer;
            transition: 0.2s;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .dock-item:active { transform: scale(0.9) translateY(-2px); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="user-profile"><i class="fas fa-user-circle"></i></div>
        <div class="login-box" style="text-align: center;">
            <h2>ยินดีต้อนรับ
