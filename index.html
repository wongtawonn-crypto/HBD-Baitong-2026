<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Surprise 🥥✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sweet-pink: #ffafbd;
            --sweet-orange: #ffc3a0;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Itim', cursive;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ffafbd, #ffc3a0, #ffafbd, #ffc3a0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* หัวใจลอย */
        .heart {
            position: absolute;
            bottom: -10%;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            animation: float Up 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .container {
            width: 90%;
            max-width: 360px;
            z-index: 10;
        }

        .box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 35px 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid rgba(255,255,255,0.5);
            /* ลบ transition ตรงนี้ออกเพื่อไม่ให้ตีกับ display none */
        }

        /* ซ่อนหน้าเริ่มต้น */
        .hidden { display: none; }

        h2 { color: #d63384; font-size: 26px; margin-top: 0; }
        p { color: #5d4037; font-size: 17px; line-height: 1.6; }

        input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #eee;
            border-radius: 15px;
            background: white;
            font-size: 18px;
            text-align: center;
            font-family: 'Itim', cursive;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Itim', cursive;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
        }

        button:hover { transform: translateY(-2px); }

        .card-img { width: 100%; border-radius: 20px; margin-bottom: 20px; border: 4px solid white; box-sizing: border-box; }
        
        #hint { color: #e91e63; font-weight: bold; margin-top: 10px; min-height: 24px; }
    </style>
</head>
<body>

    <script>
        // สร้างหัวใจลอยแบบสุ่ม
        for (let i = 0; i < 15; i++) {
            let heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animation = `floatUp ${(Math.random() * 3 + 4)}s linear infinite`;
            heart.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(heart);
        }
    </script>

    <div class="container">
        <div id="p1" class="box">
            <h2>🔒 เข้าสู่ระบบ</h2>
            <p>เพื่อรับของขวัญจากระยอง <br> กรุณาบอกชื่อเล่นคนสวยหน่อยครับ</p>
            <input type="text" id="nameInput" placeholder="ชื่อเล่นเธอคือ...">
            <button onclick="goP2()">ตกลง ✨</button>
        </div>

        <div id="p2" class="box hidden">
            <h2 id="welcomeMsg"></h2>
            <p>ทายซิ... ระยะทางจากระยอง <br>มาถึงใจเธอคือ "กี่กิโลเมตร"?</p>
            <input type="number" id="distInput" placeholder="ใส่ตัวเลขกิโลเมตร...">
            <button onclick="goP3()">ตรวจคำตอบ 📍</button>
            <div id="hint"></div>
        </div>

        <div id="p3" class="box hidden">
            <h2>Happy Birthday! 🎂</h2>
            <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3hpeXN2ejN6ZzI2ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6ZzJ6JmNoYz1n/MCG263dfe91ONF5d54/giphy.gif" class="card-img">
            <p>
                ปีนี้ไม่ได้อยู่เป่าเค้กด้วยกัน <br>
                แต่ใจ (และเค้กมะพร้าว) ส่งไปถึงแล้วนะ <br>
                <b>Chowchercof</b> อร่อยไหม? <br>
                ขอให้มีความสุขมากๆ นะคะคนเก่ง ❤️
            </p>
            <button onclick="location.reload()">Reset ✨</button>
        </div>
    </div>

    <script>
        function goP2() {
            const name = document.getElementById('nameInput').value;
            if(name.trim() !== "") {
                document.getElementById('welcomeMsg').innerText = "สวัสดีค่ะ " + name + " ❤️";
                document.getElementById('p1').style.display = 'none';
                document.getElementById('p2').style.display = 'block';
            } else {
                alert("บอกชื่อก่อนสิครับ!");
            }
        }

        function goP3() {
            const val = document.getElementById('distInput').value;
            const target = 145; // แก้ระยะทางจริงที่นี่ครับ
            const hint = document.getElementById('hint');

            if(parseInt(val) === target) {
                document.getElementById('p2').style.display = 'none';
                document.getElementById('p3').style.display = 'block';
            } else if (val === "") {
                hint.innerText = "ใส่ตัวเลขก่อนน้าา";
            } else {
                hint.innerText = val > target ? "ไกลไปนิดดด ลองใหม่!" : "ใกล้ไปหน่อยยย ลองใหม่!";
            }
        }
    </script>
</body>
</html>
